name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check & build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: dummy-key-for-build
          BLOB_READ_WRITE_TOKEN: dummy-token-for-build

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint
